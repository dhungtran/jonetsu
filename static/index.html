<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jonetsu Order</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue-600: #3900FB;
      --blue-700: #2E00C6;
      --blue-100: #EDE7FF;
      --pink-600: #E28FB0;
      --pink-500: #F5BAD0;
      --pink-200: #FCE7EF;
      --mango-500: #FFC15B;
      --mango-100: #FFF0D6;
      --teal-500: #4FBFB8;
      --ink-900: #14102B;
      --ink-600: #4A4560;
      --ink-400: #8B87A0;
      --success-600: #2F9E5B;
      --success-100: #DFF5E7;
      --danger-600: #E0466E;
      --danger-100: #FBE0E9;
      --white: #FFFFFF;
      --font-display: 'Baloo 2', sans-serif;
      --font-body: 'Nunito', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-pill: 999px;
      --border-width: 1.5px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: var(--white); color: var(--ink-900); }

    header {
      background: var(--white);
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: var(--border-width) solid var(--pink-500);
      position: sticky; top: 0; z-index: 10;
    }
    .logo {
      font-family: var(--font-display);
      font-size: 22px; font-weight: 800; color: var(--blue-600);
    }
    #table-input {
      display: flex; align-items: center; gap: 6px;
      background: var(--blue-600); border-radius: var(--radius-pill);
      padding: 6px 14px;
    }
    #table-input label {
      font-size: 11px; color: rgba(255,255,255,0.6);
      font-family: var(--font-body); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    #table-input input {
      width: 36px; background: none; border: none;
      color: var(--white); font-family: var(--font-mono);
      font-size: 14px; font-weight: 500; outline: none;
    }
    #table-input input::placeholder { color: rgba(255,255,255,0.4); }
    .dashboard-link {
      background: none; border: var(--border-width) solid var(--pink-500);
      border-radius: var(--radius-pill); padding: 6px 14px;
      font-size: 12px; font-weight: 600; color: var(--ink-600);
      font-family: var(--font-body); text-decoration: none;
      text-transform: uppercase; letter-spacing: 0.04em;
      transition: all 0.15s;
    }
    .dashboard-link:hover { background: var(--blue-600); color: var(--white); border-color: var(--blue-600); }

    #ghi-chu-wrap { padding: 8px 16px; background: var(--pink-200); border-bottom: var(--border-width) solid var(--pink-500); }
    #ghi-chu-wrap input {
      width: 100%; background: var(--white); border: var(--border-width) solid var(--pink-500);
      border-radius: var(--radius-md); padding: 8px 14px;
      font-family: var(--font-body); font-size: 13px; color: var(--ink-900); outline: none;
    }
    #ghi-chu-wrap input::placeholder { color: var(--ink-400); }

    #search-wrap { padding: 8px 16px; background: var(--white); border-bottom: var(--border-width) solid var(--pink-500); }
    #search-wrap input {
      width: 100%; background: var(--pink-200); border: var(--border-width) solid var(--pink-500);
      border-radius: var(--radius-md); padding: 8px 14px;
      font-family: var(--font-body); font-size: 13px; color: var(--ink-900); outline: none;
    }
    #search-wrap input::placeholder { color: var(--ink-400); }

    #categories {
      display: flex; overflow-x: auto; padding: 10px 16px; gap: 8px;
      background: var(--white); border-bottom: var(--border-width) solid var(--pink-500);
      scrollbar-width: none;
    }
    #categories::-webkit-scrollbar { display: none; }
    .cat-btn {
      padding: 5px 14px; border-radius: var(--radius-pill);
      border: var(--border-width) solid var(--pink-500);
      background: var(--white); color: var(--ink-600);
      font-family: var(--font-body); font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      cursor: pointer; white-space: nowrap; transition: all 0.15s;
    }
    .cat-btn.active { background: var(--blue-600); color: var(--white); border-color: var(--blue-600); }
    .cat-btn:not(.active):hover { border-color: var(--blue-600); color: var(--blue-600); }

    #menu-list {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; padding: 12px 16px; padding-bottom: 200px;
    }
    .menu-item {
      background: var(--white); border: var(--border-width) solid var(--pink-500);
      border-radius: var(--radius-md); padding: 12px;
      transition: border-color 0.15s;
    }
    .menu-item:not(.unavailable):hover { border-color: var(--blue-600); }
    .menu-item.unavailable { opacity: 0.45; }
    .item-name {
      font-family: var(--font-body); font-size: 13px; font-weight: 600;
      color: var(--ink-900); margin-bottom: 2px;
    }
    .item-price {
      font-family: var(--font-mono); font-size: 12px;
      color: var(--ink-600); margin-bottom: 10px;
    }
    .item-controls { display: flex; align-items: center; gap: 8px; }
    .item-controls button {
      width: 26px; height: 26px; border-radius: 50%;
      border: var(--border-width) solid var(--pink-500);
      background: var(--white); color: var(--ink-900);
      font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .item-controls button:not(:disabled):hover { background: var(--blue-600); color: var(--white); border-color: var(--blue-600); }
    .item-controls button:disabled { opacity: 0.3; cursor: default; }
    .item-qty {
      font-family: var(--font-mono); font-size: 14px; font-weight: 500;
      color: var(--blue-600); min-width: 18px; text-align: center;
    }
    .avail-btn {
      margin-top: 8px; width: 100%; padding: 4px;
      border: none; border-radius: var(--radius-sm);
      font-family: var(--font-body); font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.04em; cursor: pointer;
    }
    .avail-btn.co  { background: var(--success-100); color: var(--success-600); }
    .avail-btn.het { background: var(--danger-100);  color: var(--danger-600); }

    #cart {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--white); border-top: var(--border-width) solid var(--pink-500);
      padding: 12px 16px;
    }
    #cart-summary {
      font-family: var(--font-body); font-size: 12px; color: var(--ink-600);
      margin-bottom: 8px; max-height: 60px; overflow-y: auto;
    }
    #send-btn {
      width: 100%; padding: 14px;
      background: var(--blue-600); color: var(--white);
      border: none; border-radius: var(--radius-md);
      font-family: var(--font-display); font-size: 16px; font-weight: 700;
      cursor: pointer; transition: background 0.15s;
    }
    #send-btn:hover { background: var(--blue-700); }
    #send-btn:disabled { background: var(--pink-500); color: var(--white); cursor: default; }

    #bar-section { padding: 0 16px 200px; }
    #bar-section h3 {
      font-family: var(--font-body); font-size: 11px; font-weight: 700;
      color: var(--ink-400); text-transform: uppercase; letter-spacing: 0.08em;
      margin: 16px 0 8px;
    }
    #bar-summary { margin-bottom: 10px; }
    .bar-summary-badge {
      display: inline-block; background: var(--mango-100);
      border: var(--border-width) solid var(--mango-500);
      border-radius: var(--radius-pill); padding: 3px 12px;
      margin: 0 4px 4px 0; font-family: var(--font-body); font-size: 12px;
      font-weight: 600; color: var(--ink-900);
    }
    .bar-item {
      background: var(--white); border: var(--border-width) solid var(--pink-500);
      border-left: 3px solid var(--pink-600);
      border-radius: var(--radius-md); padding: 12px; margin-bottom: 8px;
    }
    .bar-ban { font-family: var(--font-display); font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .bar-line { font-family: var(--font-body); font-size: 13px; color: var(--ink-600); padding: 2px 0; }
    .bar-done-btn {
      margin-top: 8px; width: 100%;
      background: var(--pink-200); color: var(--ink-900);
      border: var(--border-width) solid var(--pink-500); border-radius: var(--radius-sm);
      padding: 7px 10px; font-family: var(--font-body); font-size: 12px;
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
      cursor: pointer; transition: all 0.15s;
    }
    .bar-done-btn:hover { background: var(--blue-600); color: var(--white); border-color: var(--blue-600); }
  </style>
</head>
<body>
<header>
  <div class="logo">Jonetsu</div>
  <div id="table-input">
    <label>Bàn</label>
    <input type="number" id="table-num" min="1" placeholder="1">
  </div>
  <a href="/static/dashboard.html" class="dashboard-link">Dashboard</a>
</header>

<div id="ghi-chu-wrap">
  <input type="text" id="ghi-chu" placeholder="Ghi chú (dị ứng, không hành...)">
</div>
<div id="search-wrap">
  <input type="text" id="search-input" placeholder="Tìm món..." oninput="searchMenu(this.value)">
</div>
<div id="categories"></div>
<div id="menu-list"></div>
<div id="bar-section">
  <h3>Bar — Đang chờ</h3>
  <div id="bar-summary"></div>
  <div id="bar-orders"></div>
</div>
<div id="cart">
  <div id="cart-summary">Chưa có món nào</div>
  <button id="send-btn" disabled>Gửi order</button>
</div>

<script>
  let menuData = [], cart = {}, activeCategory = '';
  const catOrder = [
    'Soft Drinks','Lemonade','Beer','Hot Drinks','Highball','Wine','Sake','Signature Drinks',
    'Starters','Mains','Ramen','Sashimi','Nigiri','Maki','Specials','Inside Out','Hot Rolls','Party Plates'
  ];

  async function loadMenu() {
    menuData = await fetch('/menu').then(r => r.json());
    renderCategories();
  }

  function renderCategories() {
    const cats = catOrder.filter(c => menuData.some(i => i.category === c));
    const div = document.getElementById('categories');
    div.innerHTML = '';
    cats.forEach((cat, idx) => {
      const btn = document.createElement('button');
      btn.className = 'cat-btn' + (idx === 0 ? ' active' : '');
      btn.textContent = cat;
      btn.onclick = () => {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeCategory = cat;
        document.getElementById('search-input').value = '';
        renderMenu(cat);
      };
      div.appendChild(btn);
    });
    activeCategory = cats[0];
    renderMenu(cats[0]);
  }

  function renderMenu(cat) { renderItems(menuData.filter(i => i.category === cat)); }
  function searchMenu(q) {
    renderItems(q ? menuData.filter(i => i.ten.toLowerCase().includes(q.toLowerCase())) : menuData.filter(i => i.category === activeCategory));
  }

  function renderItems(items) {
    document.getElementById('menu-list').innerHTML = items.map(item => {
      const qty = cart[item.id]?.qty || 0;
      return `
        <div class="menu-item ${item.available ? '' : 'unavailable'}">
          <div class="item-name">${item.ten}</div>
          <div class="item-price">${item.gia.toFixed(2)} €</div>
          <div class="item-controls">
            <button onclick="changeQty(${item.id},-1)" ${!item.available ? 'disabled' : ''}>−</button>
            <div class="item-qty" id="qty-${item.id}">${qty}</div>
            <button onclick="changeQty(${item.id},+1)" ${!item.available ? 'disabled' : ''}>+</button>
          </div>
          <button class="avail-btn ${item.available ? 'co' : 'het'}" onclick="toggleAvailable(${item.id})">
            ${item.available ? 'Có sẵn' : 'Hết món'}
          </button>
        </div>`;
    }).join('');
  }

  function changeQty(id, delta) {
    const item = menuData.find(i => i.id === id);
    if (!cart[id]) cart[id] = { ...item, qty: 0 };
    cart[id].qty = Math.max(0, cart[id].qty + delta);
    if (!cart[id].qty) delete cart[id];
    document.getElementById('qty-' + id).textContent = cart[id]?.qty || 0;
    updateCart();
  }

  function updateCart() {
    const items = Object.values(cart);
    const summary = document.getElementById('cart-summary');
    const btn = document.getElementById('send-btn');
    if (!items.length) { summary.textContent = 'Chưa có món nào'; btn.disabled = true; return; }
    summary.innerHTML = items.map(i => `<strong>${i.ten}</strong> x${i.qty}`).join(' · ');
    btn.disabled = false;
  }

  async function toggleAvailable(id) {
    const data = await fetch('/menu/' + id + '/available', { method: 'PATCH' }).then(r => r.json());
    menuData.find(i => i.id === id).available = data.available;
    const q = document.getElementById('search-input').value;
    q ? searchMenu(q) : renderMenu(activeCategory);
  }

  document.getElementById('send-btn').onclick = async () => {
    const ban = document.getElementById('table-num').value;
    if (!ban) { alert('Nhập số bàn!'); return; }
    const res = await fetch('/order', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ban: parseInt(ban), items: Object.values(cart).map(i => ({ mon_id: i.id, so_luong: i.qty })), dry_run: true, ghi_chu: document.getElementById('ghi-chu').value })
    });
    if (res.ok) {
      alert('Order đã gửi!');
      cart = {}; document.getElementById('ghi-chu').value = '';
      updateCart(); renderMenu(activeCategory); loadBarOrders();
    } else { alert('Lỗi! Thử lại.'); }
  };

  function renderBarSummary(pending) {
    const totals = {};
    pending.forEach(o => { totals[o.ten] = (totals[o.ten] || 0) + o.so_luong; });
    document.getElementById('bar-summary').innerHTML = Object.entries(totals).sort((a,b) => b[1]-a[1])
      .map(([ten,qty]) => `<span class="bar-summary-badge">${ten} x${qty}</span>`).join('');
  }

  async function loadBarOrders() {
    const orders = await fetch('/orders?tram=bar').then(r => r.json());
    const pending = orders.filter(o => o.trang_thai === 'cho');
    renderBarSummary(pending);
    const div = document.getElementById('bar-orders');
    if (!pending.length) { div.innerHTML = '<p style="color:var(--ink-400);font-size:13px;padding:8px 0">Không có order nào</p>'; return; }
    const grouped = {};
    pending.forEach(o => {
      const key = o.order_id || o.id;
      if (!grouped[key]) grouped[key] = { ban: o.ban, items: [], ids: [] };
      grouped[key].items.push(`x${o.so_luong} ${o.ten}`);
      grouped[key].ids.push(o.id);
    });
    div.innerHTML = Object.values(grouped).map(g => `
      <div class="bar-item">
        <div class="bar-ban">Bàn ${g.ban}</div>
        ${g.items.map(i => `<div class="bar-line">${i}</div>`).join('')}
        <button class="bar-done-btn" onclick="barDone(${JSON.stringify(g.ids)})">Xong</button>
      </div>`).join('');
  }

  async function barDone(ids) {
    await Promise.all(ids.map(id => fetch('/orders/' + id + '/done', { method: 'PATCH' })));
    loadBarOrders();
  }

  loadMenu(); loadBarOrders();
  setInterval(loadBarOrders, 5000);
</script>
</body>
</html>
