<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jonetsu Order</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; }

    header {
      background: #c0392b;
      color: white;
      padding: 16px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    #table-select {
      padding: 12px 16px;
      background: white;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #ddd;
    }

    #table-select label { font-weight: bold; }

    #table-select input {
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 16px;
      width: 80px;
    }

    #categories {
      display: flex;
      overflow-x: auto;
      background: white;
      border-bottom: 2px solid #ddd;
      padding: 0 8px;
    }

    .cat-btn {
      padding: 10px 16px;
      border: none;
      background: none;
      cursor: pointer;
      white-space: nowrap;
      font-size: 14px;
      border-bottom: 3px solid transparent;
    }

    .cat-btn.active {
      border-bottom: 3px solid #c0392b;
      font-weight: bold;
      color: #c0392b;
    }

    #menu-list {
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding-bottom: 180px;
    }

    .menu-item {
      background: white;
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .item-name { font-size: 14px; font-weight: bold; }
    .item-price { font-size: 13px; color: #888; }

    .item-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }

    .item-controls button {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: none;
      background: #c0392b;
      color: white;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
    }

    .item-qty { font-size: 16px; font-weight: bold; min-width: 20px; text-align: center; }

    #cart {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: white;
      border-top: 2px solid #ddd;
      padding: 12px 16px;
    }

    #cart-summary { font-size: 14px; color: #555; margin-bottom: 10px; max-height: 80px; overflow-y: auto; }

    #send-btn {
      width: 100%;
      padding: 14px;
      background: #c0392b;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    #send-btn:disabled { background: #aaa; }
  </style>
</head>
<body>

<header>🍣 Jonetsu</header>

<div id="table-select">
  <label>Bàn số:</label>
  <input type="number" id="table-num" min="1" placeholder="1">
</div>

<div id="categories"></div>
<div id="menu-list"></div>

<div id="cart">
  <div id="cart-summary">Chưa có món nào</div>
  <button id="send-btn" disabled>Gửi Order</button>
</div>

<script>
  let menuData = [];
  let cart = {};
  let activeCategory = '';

  async function loadMenu() {
    const res = await fetch('/menu');
    menuData = await res.json();
    renderCategories();
  }

  function renderCategories() {
    const cats = [...new Set(menuData.map(i => i.category))];
    const div = document.getElementById('categories');
    div.innerHTML = '';
    cats.forEach((cat, idx) => {
      const btn = document.createElement('button');
      btn.className = 'cat-btn' + (idx === 0 ? ' active' : '');
      btn.textContent = cat;
      btn.onclick = () => {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeCategory = cat;
        renderMenu(cat);
      };
      div.appendChild(btn);
    });
    activeCategory = cats[0];
    renderMenu(cats[0]);
  }

  function renderMenu(category) {
    const items = menuData.filter(i => i.category === category);
    const div = document.getElementById('menu-list');
    div.innerHTML = '';
    items.forEach(item => {
      const qty = cart[item.id]?.qty || 0;
      div.innerHTML += `
        <div class="menu-item">
          <div class="item-name">${item.ten}</div>
          <div class="item-price">${item.gia.toFixed(2)} €</div>
          <div class="item-controls">
            <button onclick="changeQty(${item.id}, -1)">−</button>
            <div class="item-qty" id="qty-${item.id}">${qty}</div>
            <button onclick="changeQty(${item.id}, +1)">+</button>
          </div>
        </div>`;
    });
  }

  function changeQty(id, delta) {
    const item = menuData.find(i => i.id === id);
    if (!cart[id]) cart[id] = { ...item, qty: 0 };
    cart[id].qty = Math.max(0, cart[id].qty + delta);
    if (cart[id].qty === 0) delete cart[id];
    document.getElementById('qty-' + id).textContent = cart[id]?.qty || 0;
    updateCart();
  }

  function updateCart() {
    const items = Object.values(cart);
    const summary = document.getElementById('cart-summary');
    const btn = document.getElementById('send-btn');
    if (items.length === 0) {
      summary.textContent = 'Chưa có món nào';
      btn.disabled = true;
    } else {
      summary.innerHTML = items.map(i => `${i.ten} x${i.qty}`).join('<br>');
      btn.disabled = false;
    }
  }

  document.getElementById('send-btn').onclick = async () => {
    const ban = document.getElementById('table-num').value;
    if (!ban) { alert('Nhập số bàn!'); return; }
    const items = Object.values(cart).map(i => ({ mon_id: i.id, so_luong: i.qty }));
    const res = await fetch('/order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ban: parseInt(ban), items, dry_run: true })
    });
    if (res.ok) {
      alert('Order đã gửi!');
      cart = {};
      updateCart();
      renderMenu(activeCategory);
    } else {
      alert('Lỗi! Thử lại.');
    }
  };

  loadMenu();
</script>
</body>
</html>
