<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue-600: #3900FB;
      --blue-700: #2E00C6;
      --pink-600: #E28FB0;
      --pink-500: #F5BAD0;
      --pink-200: #FCE7EF;
      --mango-500: #FFC15B;
      --mango-100: #FFF0D6;
      --teal-500: #4FBFB8;
      --ink-900: #14102B;
      --ink-600: #4A4560;
      --ink-400: #8B87A0;
      --success-600: #2F9E5B;
      --success-100: #DFF5E7;
      --danger-600: #E0466E;
      --danger-100: #FBE0E9;
      --white: #FFFFFF;
      --font-display: 'Baloo 2', sans-serif;
      --font-body: 'Nunito', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 24px;
      --radius-pill: 999px;
      --border-width: 1.5px;

      --bg-page: var(--pink-200);
      --bg-surface-raised: var(--white);
      --bg-surface-tint: var(--pink-200);
      --text-primary: var(--ink-900);
      --text-secondary: var(--ink-600);
      --text-muted: var(--ink-400);
      --border-default: var(--pink-500);
      --accent-primary: var(--blue-600);
      --accent-primary-hover: var(--blue-700);
    }
    :root[data-theme="dark"] {
      --bg-page: #0F0B22;
      --bg-surface-raised: #221A4D;
      --bg-surface-tint: rgba(245,186,208,0.08);
      --text-primary: #FFFFFF;
      --text-secondary: var(--pink-200);
      --text-muted: #8A83B8;
      --border-default: rgba(245,186,208,0.22);
      --accent-primary: #8B6BFF;
      --accent-primary-hover: #A88CFF;
      --success-100: rgba(47,158,91,0.2);
      --danger-100: rgba(224,70,110,0.2);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: var(--bg-page); color: var(--text-primary); padding: 16px; min-height: 100vh; transition: background 0.2s, color 0.2s; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; padding: 4px 0;
    }
    .header-title { font-family: var(--font-display); font-size: 24px; font-weight: 800; color: var(--accent-primary); }
    .logo-link img { width: 40px; height: 40px; object-fit: contain; display: block; }
    .header-sub { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .header-right { display: flex; align-items: center; gap: 8px; }

    .theme-toggle {
      background: var(--bg-surface-raised); border: var(--border-width) solid var(--border-default);
      border-radius: var(--radius-pill); padding: 4px 10px;
      font-size: 14px; cursor: pointer; transition: all 0.15s;
    }

    #tables { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }

    .card {
      background: var(--bg-surface-raised); border-radius: var(--radius-md); overflow: hidden;
      border: var(--border-width) solid var(--border-default);
    }
    .card-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 16px; cursor: pointer; user-select: none; transition: background 0.15s;
    }
    .card-header:hover { background: var(--bg-surface-tint); }
    .ban-num { font-family: var(--font-display); font-size: 20px; font-weight: 800; color: var(--text-primary); }
    .ban-time { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); display: block; margin-top: 2px; }
    .dots { display: flex; gap: 5px; align-items: center; }
    .dot { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; padding: 2px 8px; border-radius: var(--radius-pill); }
    .dot.pending { background: var(--danger-100); color: var(--danger-600); }
    .dot.done    { background: var(--success-100); color: var(--success-600); }
    .chevron { color: var(--text-muted); font-size: 11px; margin-left: 6px; transition: transform 0.2s; }
    .card.open .chevron { transform: rotate(180deg); }

    .card-body { display: none; padding: 0 16px 16px; border-top: var(--border-width) solid var(--border-default); }
    .card.open .card-body { display: block; }

    .station { margin-top: 12px; }
    .station-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .station-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; padding: 2px 8px; border-radius: var(--radius-pill); }
    .label-bar    { background: rgba(226,143,176,0.2); color: var(--pink-600); }
    .label-sushi  { background: rgba(79,191,184,0.15); color: #0f6b65; }
    .label-kitchen{ background: var(--mango-100); color: var(--ink-900); }

    .all-btn {
      font-size: 11px; font-weight: 700; padding: 3px 10px;
      border: var(--border-width) solid var(--accent-primary);
      background: var(--bg-surface-raised); color: var(--accent-primary);
      border-radius: var(--radius-pill); cursor: pointer; transition: all 0.15s;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .all-btn:hover { background: var(--accent-primary); color: #fff; }
    .done-label { font-size: 11px; font-weight: 700; color: var(--success-600); text-transform: uppercase; letter-spacing: 0.04em; }

    .order-row {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 8px; border-radius: var(--radius-sm); margin-bottom: 4px;
      background: var(--bg-surface-tint); cursor: pointer; transition: background 0.15s;
    }
    .order-row:hover { background: var(--border-default); }
    .order-row.done { background: var(--success-100); }
    .order-row input[type=checkbox] { accent-color: var(--accent-primary); width: 15px; height: 15px; flex-shrink: 0; }
    .row-name { flex: 1; font-size: 13px; font-weight: 500; color: var(--text-primary); }
    .order-row.done .row-name { text-decoration: line-through; color: var(--text-muted); }

    .divider { border: none; border-top: var(--border-width) solid var(--border-default); margin: 10px 0; }

    .pay-btn {
      width: 100%; margin-top: 12px; padding: 12px;
      background: var(--accent-primary); color: #fff; border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-display); font-size: 16px; font-weight: 700;
      cursor: pointer; transition: background 0.15s;
    }
    .pay-btn:hover { background: var(--accent-primary-hover); }

    .pay-options { display: flex; gap: 8px; margin-top: 12px; }
    .pay-opt {
      flex: 1; padding: 11px; border: none; border-radius: var(--radius-sm);
      font-family: var(--font-display); font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background 0.15s;
    }
    .pay-opt.card-pay { background: var(--accent-primary); color: #fff; }
    .pay-opt.card-pay:hover { background: var(--accent-primary-hover); }
    .pay-opt.cash { background: var(--bg-surface-tint); color: var(--text-primary); border: var(--border-width) solid var(--border-default); }
    .pay-opt.cash:hover { background: var(--border-default); }

    .cancel-btn {
      width: 100%; margin-top: 6px; padding: 7px; background: none;
      border: var(--border-width) solid var(--border-default); border-radius: var(--radius-sm);
      font-family: var(--font-body); font-size: 12px; font-weight: 600;
      color: var(--text-muted); cursor: pointer;
    }

    #empty { text-align: center; color: var(--text-muted); margin-top: 60px; font-size: 14px; display: none; }
  </style>
</head>
<body>
<header>
  <a href="/" class="logo-link"><img src="/static/logo.png" alt="Jonetsu"></a>
  <div>
    <div class="header-title">Dashboard</div>
  </div>
  <div class="header-right">
    <button onclick="location.href='/static/index.html'" style="
      font-family: var(--font-body); font-size: 16px; font-weight: 600;
      color: var(--text-secondary); background: none;
      border: var(--border-width) solid var(--border-default);
      border-radius: var(--radius-pill); padding: 6px 14px;
      cursor: pointer;">←</button>
  </div>
</header>
<div id="tables"></div>
<div id="empty">Không có bàn nào đang hoạt động</div>

<script>
  (function(){ document.documentElement.dataset.theme = localStorage.getItem('theme') === 'dark' ? 'dark' : 'light'; })();

  const STATIONS = [
    { key: 'bar',   label: 'Bar',    labelClass: 'label-bar'     },
    { key: 'sushi', label: 'Sushi',  labelClass: 'label-sushi'   },
    { key: 'bep',   label: 'Kitchen',labelClass: 'label-kitchen' },
  ];
  const openBans = new Set();

  async function load() {
    const orders = await fetch('/tables').then(r => r.json());
    const grouped = {};
    orders.forEach(o => {
      if (!grouped[o.ban]) grouped[o.ban] = { items: [], first_time: o.thoi_gian };
      grouped[o.ban].items.push(o);
    });
    const div = document.getElementById('tables');
    div.innerHTML = '';
    const bans = Object.keys(grouped).sort((a,b) => +a - +b);
    document.getElementById('empty').style.display = bans.length ? 'none' : 'block';

    bans.forEach(ban => {
      const { items, first_time } = grouped[ban];
      const time = new Date(first_time).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
      const isOpen = openBans.has(String(ban));

      const dotsHtml = STATIONS.map(({ key, label }) => {
        const st = items.filter(o => o.tram === key);
        if (!st.length) return '';
        const pending = st.some(o => o.trang_thai === 'cho');
        return `<span class="dot ${pending ? 'pending' : 'done'}">${label} ${pending ? 'chờ' : '✓'}</span>`;
      }).join('');

      let sectionsHtml = '';
      STATIONS.forEach(({ key, label, labelClass }) => {
        const st = items.filter(o => o.tram === key);
        if (!st.length) return;
        const pendingIds = st.filter(o => o.trang_thai === 'cho').map(o => o.id);
        sectionsHtml += `
          <div class="station">
            <div class="station-header">
              <span class="station-label ${labelClass}">${label}</span>
              ${!pendingIds.length
                ? '<span class="done-label">✓ Xong</span>'
                : `<button class="all-btn" onclick="markAll([${pendingIds}])">Tất cả xong</button>`}
            </div>
            ${st.map(o => `
              <div class="order-row ${o.trang_thai === 'xong' ? 'done' : ''}" onclick="toggle(${o.id},'${o.trang_thai}')">
                <input type="checkbox" ${o.trang_thai === 'xong' ? 'checked' : ''} onclick="event.stopPropagation();toggle(${o.id},'${o.trang_thai}')">
                <span class="row-name">x${o.so_luong} ${o.ten}</span>
              </div>`).join('')}
          </div><hr class="divider">`;
      });

      div.innerHTML += `
        <div class="card ${isOpen ? 'open' : ''}" id="card-${ban}">
          <div class="card-header" onclick="toggleCard('${ban}')">
            <div>
              <span class="ban-num">Bàn ${ban}</span>
              <span class="ban-time">Từ ${time}</span>
            </div>
            <div style="display:flex;align-items:center;">
              <div class="dots">${dotsHtml}</div>
              <span class="chevron">▼</span>
            </div>
          </div>
          <div class="card-body">
            ${sectionsHtml}
            <div id="pay-${ban}">
              <button class="pay-btn" onclick="showPayOptions('${ban}')">Thanh toán</button>
            </div>
          </div>
        </div>`;
    });
  }

  function toggleCard(ban) {
    const s = String(ban);
    openBans.has(s) ? openBans.delete(s) : openBans.add(s);
    document.getElementById('card-' + ban).classList.toggle('open', openBans.has(s));
  }
  function showPayOptions(ban) {
    document.getElementById('pay-' + ban).innerHTML = `
      <div class="pay-options">
        <button class="pay-opt card-pay" onclick="pay(${ban})">Card</button>
        <button class="pay-opt cash" onclick="pay(${ban})">Cash</button>
      </div>
      <button class="cancel-btn" onclick="cancelPay('${ban}')">Huỷ</button>`;
  }
  function cancelPay(ban) {
    document.getElementById('pay-' + ban).innerHTML =
      `<button class="pay-btn" onclick="showPayOptions('${ban}')">Thanh toán</button>`;
  }
  async function toggle(id, status) {
    await fetch('/orders/' + id + (status === 'cho' ? '/done' : '/undo'), { method: 'PATCH' });
    load();
  }
  async function markAll(ids) {
    await Promise.all(ids.map(id => fetch('/orders/' + id + '/done', { method: 'PATCH' })));
    load();
  }
  async function pay(ban) {
    await fetch('/tables/' + ban + '/paid', { method: 'PATCH' });
    openBans.delete(String(ban));
    load();
  }
  load();
  setInterval(load, 8000);
</script>
</body>
</html>
