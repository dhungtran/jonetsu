<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jonetsu</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif; background: #f8f7fc; color: #1e1b4b;
      height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
    }
    .logo { font-size: 36px; font-weight: 700; margin-bottom: 4px; }
    .logo span { color: #a855f7; }
    p { color: #a855f7; font-size: 14px; margin-bottom: 8px; }
    .role-btn {
      width: 260px; padding: 16px 20px; font-size: 16px; font-weight: 600;
      border: none; border-radius: 12px; cursor: pointer; color: white;
      transition: opacity 0.2s;
    }
    .role-btn:hover { opacity: 0.85; }
    .waiter  { background: linear-gradient(135deg, #7c3aed, #a855f7); }
    .kitchen { background: linear-gradient(135deg, #ec4899, #f472b6); }
    .sushi   { background: linear-gradient(135deg, #7c3aed, #ec4899); }
  </style>
</head>
<body>
  <div class="logo"><span>Jonetsu</span></div>
  <p>Chọn vai trò của bạn</p>
  <button class="role-btn waiter" onclick="location.href='/static/index.html'">Waiter</button>
  <button class="role-btn kitchen" onclick="location.href='/static/kitchen.html?tram=bep'">Kitchen</button>
  <button class="role-btn sushi" onclick="location.href='/static/kitchen.html?tram=sushi'">Sushi</button>
</body>
</html>
