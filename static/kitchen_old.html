<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f8f7fc; color: #1e1b4b; padding: 16px; }
    header {
      text-align: center; font-size: 20px; font-weight: bold; padding: 14px;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      color: white; border-radius: 12px; margin-bottom: 16px;
    }
    #summary-section {
      background: white; border-radius: 12px; padding: 14px 16px;
      margin-bottom: 16px; border: 1px solid #e9d5ff;
    }
    #summary-label { font-size: 12px; color: #a855f7; margin-bottom: 8px; }
    #orders { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px; }
    .order-card {
      background: white; border-radius: 12px; padding: 16px;
      border-left: 4px solid #a855f7;
      box-shadow: 0 2px 8px rgba(168,85,247,0.08);
    }
    .ban { font-size: 20px; font-weight: bold; color: #7c3aed; margin-bottom: 4px; }
    .time { font-size: 12px; color: #a855f7; margin-bottom: 10px; }
    .item { padding: 4px 0; font-size: 14px; border-bottom: 1px solid #f5f0ff; }
    .item:last-of-type { border-bottom: none; }
    .done-btn {
      margin-top: 12px; width: 100%; padding: 10px;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      color: white; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .tag { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 12px; }
    .tag-vor   { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .tag-hot   { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
    .tag-sushi { background: #f5f0ff; color: #7c3aed; border: 1px solid #e9d5ff; }
  </style>
</head>
<body>
<header id="page-header">🍳 Kitchen Display</header>
<div id="summary-section">
  <div id="summary-label">Tổng đang chờ</div>
  <div id="summary-list"></div>
</div>
<div id="orders"></div>
<script>
  const tram = new URLSearchParams(window.location.search).get('tram') || '';
  if (tram === 'sushi') document.getElementById('page-header').textContent = '🍣 Sushi Display';

  function renderSummary(pending) {
    const totals = {};
    pending.forEach(o => { if (!totals[o.ten]) totals[o.ten] = 0; totals[o.ten] += o.so_luong; });
    const div = document.getElementById('summary-list');
    const sorted = Object.entries(totals).sort((a, b) => b[1] - a[1]);
    if (!sorted.length) { div.innerHTML = '<span style="color:#c4b5fd;font-size:13px">Không có gì</span>'; return; }
    div.innerHTML = sorted.map(([ten, qty]) =>
      `<span style="display:inline-block;background:#f5f0ff;border:1px solid #d8b4fe;border-radius:20px;padding:4px 12px;margin:3px;font-size:13px;color:#7c3aed;">
        ${ten} <strong style="color:#ec4899;">x${qty}</strong>
      </span>`).join('');
  }

  async function loadOrders() {
    const url = tram ? '/orders?tram=' + tram : '/orders';
    const [res, allRes] = await Promise.all([fetch(url), fetch('/orders')]);
    const orders = await res.json();
    const allOrders = await allRes.json();
    const pending = orders.filter(o => o.trang_thai === 'cho');
    const div = document.getElementById('orders');
    div.innerHTML = '';
    renderSummary(pending);
    if (!pending.length) {
      div.innerHTML = '<p style="text-align:center;color:#c4b5fd;margin-top:40px">Không có order nào</p>';
      return;
    }

    const grouped = {};
    pending.forEach(o => {
      const key = o.order_id || o.id;
      if (!grouped[key]) {
        const others = allOrders.filter(a => a.order_id === key && a.trang_thai === 'cho' && a.tram !== tram);
        grouped[key] = {
          ban: o.ban, thoi_gian: o.thoi_gian, items: [], ids: [], ghi_chu: o.ghi_chu,
          hasStarter: others.some(a => a.category === 'Starters'),
          hasMain: others.some(a => ['Mains','Ramen'].includes(a.category)),
          hasSushi: others.some(a => a.tram === 'sushi'),
        };
      }
      grouped[key].items.push(`x${o.so_luong} — ${o.ten}`);
      grouped[key].ids.push(o.id);
    });

    Object.values(grouped).forEach(g => {
      const tags = [
        g.hasStarter ? '<span class="tag tag-vor">Có vor</span>' : '',
        g.hasMain    ? '<span class="tag tag-hot">Có đồ nóng</span>' : '',
        g.hasSushi   ? '<span class="tag tag-sushi">Có sushi</span>' : '',
      ].filter(Boolean).join('');

      div.innerHTML += `
        <div class="order-card">
          <div class="ban">Bàn ${g.ban}</div>
          <div class="time">${new Date(g.thoi_gian).toLocaleTimeString('vi-VN')}</div>
          ${g.items.map(i => `<div class="item">${i}</div>`).join('')}
          ${g.ghi_chu ? `<div style="margin-top:8px;padding:6px 10px;background:#fdf2f8;border:1px solid #f9a8d4;border-radius:8px;font-size:13px;color:#db2777;">📝 ${g.ghi_chu}</div>` : ''}
          ${tags ? `<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">${tags}</div>` : ''}
          <button class="done-btn" onclick="markGroupDone(${JSON.stringify(g.ids)})">✓ Đánh dấu xong</button>
        </div>`;
    });
  }

  async function markGroupDone(ids) {
    await Promise.all(ids.map(id => fetch('/orders/' + id + '/done', { method: 'PATCH' })));
    loadOrders();
  }

  loadOrders();
  setInterval(loadOrders, 5000);
</script>
</body>
</html>
