<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 16px; }

    header {
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      padding: 16px;
      background: #c0392b;
      border-radius: 10px;
      margin-bottom: 16px;
    }

    #orders {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 12px;
    }

    .order-card {
      background: #2d2d2d;
      border-radius: 10px;
      padding: 16px;
      border-left: 5px solid #f39c12;
    }

    .ban { font-size: 20px; font-weight: bold; margin-bottom: 8px; }
    .time { font-size: 12px; color: #aaa; margin-bottom: 10px; }
    .item { padding: 4px 0; font-size: 15px; }

    .done-btn {
      margin-top: 12px;
      width: 100%;
      padding: 10px;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>🍳 Kitchen Display</header>
<div id="orders"></div>

<script>
  async function loadOrders() {
    const tram = new URLSearchParams(window.location.search).get('tram') || '';
    const url = tram ? '/orders?tram=' + tram : '/orders';
    const res = await fetch(url);
    const orders = await res.json();
    const pending = orders.filter(o => o.trang_thai === 'cho');
    const div = document.getElementById('orders');
    div.innerHTML = '';

    if (pending.length === 0) {
      div.innerHTML = '<p style="text-align:center;color:#aaa;margin-top:40px">Không có order nào</p>';
      return;
    }

    // Gom món theo order_id
    const grouped = {};
    pending.forEach(o => {
      const key = o.order_id || o.id;
      if (!grouped[key]) {
        grouped[key] = { ban: o.ban, thoi_gian: o.thoi_gian, items: [], ids: [] };
      }
      grouped[key].items.push(`x${o.so_luong} — ${o.ten}`);
      grouped[key].ids.push(o.id);
    });

    Object.values(grouped).forEach(group => {
      div.innerHTML += `
        <div class="order-card">
          <div class="ban">Bàn ${group.ban}</div>
          <div class="time">${new Date(group.thoi_gian).toLocaleTimeString('vi-VN')}</div>
          ${group.items.map(i => `<div class="item">${i}</div>`).join('')}
          <button class="done-btn" onclick="markGroupDone(${JSON.stringify(group.ids)})">
            Đánh dấu xong
          </button>
        </div>`;
    });
  }

  async function markGroupDone(ids) {
    await Promise.all(ids.map(id =>
      fetch('/orders/' + id + '/done', { method: 'PATCH' })
    ));
    loadOrders();
  }

  loadOrders();
  setInterval(loadOrders, 5000);
</script>
</body>
</html>
