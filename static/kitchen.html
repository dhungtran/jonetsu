<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 16px; }

    header {
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      padding: 16px;
      background: #c0392b;
      border-radius: 10px;
      margin-bottom: 16px;
    }

    #orders {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 12px;
    }

    .order-card {
      background: #2d2d2d;
      border-radius: 10px;
      padding: 16px;
      border-left: 5px solid #f39c12;
    }

    .order-card.done {
      border-left-color: #27ae60;
      opacity: 0.5;
    }

    .ban { font-size: 20px; font-weight: bold; margin-bottom: 8px; }
    .time { font-size: 12px; color: #aaa; margin-bottom: 10px; }
    .item { padding: 4px 0; font-size: 15px; }

    .done-btn {
      margin-top: 12px;
      width: 100%;
      padding: 10px;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }

    .done-btn:disabled { background: #555; cursor: default; }
  </style>
</head>
<body>

<header>🍳 Kitchen Display</header>
<div id="orders"></div>

<script>
  async function loadOrders() {
    const res = await fetch('/orders');
    const orders = await res.json();
    const div = document.getElementById('orders');
    div.innerHTML = '';

    if (orders.length === 0) {
      div.innerHTML = '<p style="text-align:center;color:#aaa;margin-top:40px">Không có order nào</p>';
      return;
    }

    orders.forEach(order => {
      const done = order.trang_thai === 'xong';
      div.innerHTML += `
        <div class="order-card ${done ? 'done' : ''}">
          <div class="ban">Bàn ${order.ban}</div>
          <div class="time">${new Date(order.thoi_gian).toLocaleTimeString('vi-VN')}</div>
          <div class="item">x${order.so_luong} — ${order.ten}</div>
          <button class="done-btn" ${done ? 'disabled' : ''} onclick="markDone(${order.id})">
            ${done ? 'Đã xong' : 'Đánh dấu xong'}
          </button>
        </div>`;
    });
  }

  async function markDone(id) {
    await fetch('/orders/' + id + '/done', { method: 'PATCH' });
    loadOrders();
  }

  loadOrders();
  setInterval(loadOrders, 5000);
</script>
</body>
</html>
