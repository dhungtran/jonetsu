<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f0e8; color: #1a1a1a; padding: 16px; }
    header {
      background: #1a1a1a; color: #f5f0e8; text-align: center;
      font-size: 15px; font-weight: 600; letter-spacing: 2px;
      padding: 14px; border-radius: 10px; margin-bottom: 16px;
    }
    #tables { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
    .card { background: #fff; border-radius: 10px; overflow: hidden; border: 0.5px solid #e0d8cc; }
    .card-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 16px; cursor: pointer; user-select: none; transition: background 0.15s;
    }
    .card-header:hover { background: #faf5eb; }
    .ban-num { font-size: 18px; font-weight: 600; }
    .ban-time { font-size: 11px; color: #8a7a6a; display: block; margin-top: 2px; }
    .dots { display: flex; gap: 5px; }
    .dot { font-size: 11px; padding: 2px 8px; border-radius: 4px; }
    .dot.pending { background: #fff7ed; color: #c2410c; }
    .dot.done    { background: #f0fdf4; color: #15803d; }
    .chevron { color: #b8ad9e; font-size: 11px; margin-left: 6px; transition: transform 0.2s; }
    .card.open .chevron { transform: rotate(180deg); }
    .card-body { display: none; padding: 0 16px 16px; border-top: 0.5px solid #f0ebe0; }
    .card.open .card-body { display: block; }
    .station { margin-top: 12px; }
    .station-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .station-label { font-size: 11px; font-weight: 600; color: #8a7a6a; text-transform: uppercase; letter-spacing: 0.5px; }
    .all-btn {
      font-size: 11px; padding: 3px 10px; border: 0.5px solid #1a1a1a;
      background: #fff; color: #1a1a1a; border-radius: 4px; cursor: pointer; transition: all 0.15s;
    }
    .all-btn:hover { background: #1a1a1a; color: #fff; }
    .done-label { font-size: 11px; color: #15803d; }
    .order-row {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 8px; border-radius: 6px; margin-bottom: 4px;
      background: #faf5eb; cursor: pointer; transition: background 0.15s;
    }
    .order-row:hover { background: #f0ebe0; }
    .order-row.done { background: #f0fdf4; }
    .order-row input[type=checkbox] { accent-color: #1a1a1a; width: 15px; height: 15px; flex-shrink: 0; }
    .row-name { flex: 1; font-size: 13px; }
    .order-row.done .row-name { text-decoration: line-through; color: #b8ad9e; }
    .divider { border: none; border-top: 0.5px solid #f0ebe0; margin: 10px 0; }
    .pay-btn {
      width: 100%; margin-top: 12px; padding: 11px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer; letter-spacing: 0.5px;
      background: #1a1a1a; color: #fff; transition: opacity 0.2s;
    }
    .pay-btn:hover { opacity: 0.85; }
    .pay-options { display: flex; gap: 8px; margin-top: 12px; }
    .pay-opt {
      flex: 1; padding: 11px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
    }
    .pay-opt.card-pay { background: #1a1a1a; color: #fff; }
    .pay-opt.cash { background: #f5f0e8; color: #1a1a1a; border: 0.5px solid #e0d8cc; }
    .pay-opt:hover { opacity: 0.8; }
    .cancel-btn {
      width: 100%; margin-top: 6px; padding: 7px; background: none;
      border: 0.5px solid #e0d8cc; border-radius: 6px; color: #8a7a6a; font-size: 12px; cursor: pointer;
    }
    #empty { text-align: center; color: #8a7a6a; margin-top: 60px; font-size: 14px; display: none; }
  </style>
</head>
<body>
<header>TRẠNG THÁI BÀN</header>
<div id="tables"></div>
<div id="empty">Không có bàn nào đang hoạt động</div>
<script>
  const STATIONS = [
    { key: 'bar', label: 'Nước' }, { key: 'sushi', label: 'Sushi' }, { key: 'bep', label: 'Bếp' },
  ];
  const openBans = new Set();

  async function load() {
    const orders = await fetch('/tables').then(r => r.json());
    const grouped = {};
    orders.forEach(o => {
      if (!grouped[o.ban]) grouped[o.ban] = { items: [], first_time: o.thoi_gian };
      grouped[o.ban].items.push(o);
    });
    const div = document.getElementById('tables');
    div.innerHTML = '';
    const bans = Object.keys(grouped).sort((a, b) => +a - +b);
    document.getElementById('empty').style.display = bans.length ? 'none' : 'block';
    bans.forEach(ban => {
      const { items, first_time } = grouped[ban];
      const time = new Date(first_time).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
      const isOpen = openBans.has(String(ban));
      const dotsHtml = STATIONS.map(({ key, label }) => {
        const st = items.filter(o => o.tram === key);
        if (!st.length) return '';
        const pending = st.some(o => o.trang_thai === 'cho');
        return `<span class="dot ${pending ? 'pending' : 'done'}">${label} ${pending ? 'chờ' : '✓'}</span>`;
      }).join('');
      let sectionsHtml = '';
      STATIONS.forEach(({ key, label }) => {
        const st = items.filter(o => o.tram === key);
        if (!st.length) return;
        const pendingIds = st.filter(o => o.trang_thai === 'cho').map(o => o.id);
        sectionsHtml += `
          <div class="station">
            <div class="station-header">
              <span class="station-label">${label}</span>
              ${!pendingIds.length ? '<span class="done-label">✓ Xong</span>' : `<button class="all-btn" onclick="markAll([${pendingIds}])">Tất cả xong</button>`}
            </div>
            ${st.map(o => `
              <div class="order-row ${o.trang_thai === 'xong' ? 'done' : ''}" onclick="toggle(${o.id},'${o.trang_thai}')">
                <input type="checkbox" ${o.trang_thai === 'xong' ? 'checked' : ''} onclick="event.stopPropagation();toggle(${o.id},'${o.trang_thai}')">
                <span class="row-name">x${o.so_luong} ${o.ten}</span>
              </div>`).join('')}
          </div><hr class="divider">`;
      });
      div.innerHTML += `
        <div class="card ${isOpen ? 'open' : ''}" id="card-${ban}">
          <div class="card-header" onclick="toggleCard('${ban}')">
            <div><span class="ban-num">Bàn ${ban}</span><span class="ban-time">Từ ${time}</span></div>
            <div style="display:flex;align-items:center;"><div class="dots">${dotsHtml}</div><span class="chevron">▼</span></div>
          </div>
          <div class="card-body">
            ${sectionsHtml}
            <div id="pay-${ban}"><button class="pay-btn" onclick="showPayOptions('${ban}')">Thanh toán</button></div>
          </div>
        </div>`;
    });
  }

  function toggleCard(ban) {
    const s = String(ban);
    openBans.has(s) ? openBans.delete(s) : openBans.add(s);
    document.getElementById('card-' + ban).classList.toggle('open', openBans.has(s));
  }
  function showPayOptions(ban) {
    document.getElementById('pay-' + ban).innerHTML = `
      <div class="pay-options">
        <button class="pay-opt card-pay" onclick="pay(${ban})">Card</button>
        <button class="pay-opt cash" onclick="pay(${ban})">Cash</button>
      </div>
      <button class="cancel-btn" onclick="cancelPay('${ban}')">Huỷ</button>`;
  }
  function cancelPay(ban) {
    document.getElementById('pay-' + ban).innerHTML = `<button class="pay-btn" onclick="showPayOptions('${ban}')">Thanh toán</button>`;
  }
  async function toggle(id, status) {
    await fetch('/orders/' + id + (status === 'cho' ? '/done' : '/undo'), { method: 'PATCH' });
    load();
  }
  async function markAll(ids) {
    await Promise.all(ids.map(id => fetch('/orders/' + id + '/done', { method: 'PATCH' })));
    load();
  }
  async function pay(ban) {
    await fetch('/tables/' + ban + '/paid', { method: 'PATCH' });
    openBans.delete(String(ban));
    load();
  }
  load();
  setInterval(load, 8000);
</script>
</body>
</html>
