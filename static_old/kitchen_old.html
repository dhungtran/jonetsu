<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f0e8; color: #1a1a1a; padding: 16px; }
    header {
      background: #1a1a1a; color: #f5f0e8; text-align: center;
      font-size: 15px; font-weight: 600; letter-spacing: 2px;
      padding: 14px; border-radius: 10px; margin-bottom: 16px;
    }
    #summary-section {
      background: #fff; border: 0.5px solid #e0d8cc;
      border-radius: 10px; padding: 14px 16px; margin-bottom: 16px;
    }
    #summary-label { font-size: 11px; color: #8a7a6a; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    #orders { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px; }
    .order-card {
      background: #fff; border-radius: 10px; padding: 16px;
      border: 0.5px solid #e0d8cc; border-left: 3px solid #1a1a1a;
    }
    .ban { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .time { font-size: 11px; color: #8a7a6a; margin-bottom: 10px; }
    .item { padding: 5px 0; font-size: 13px; border-bottom: 0.5px solid #f0ebe0; }
    .item:last-of-type { border-bottom: none; }
    .done-btn {
      margin-top: 12px; width: 100%; padding: 10px;
      background: #1a1a1a; color: #fff; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity 0.2s;
    }
    .done-btn:hover { opacity: 0.8; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
    .tag-vor   { background: #f0fdf4; color: #15803d; }
    .tag-hot   { background: #fff7ed; color: #c2410c; }
    .tag-sushi { background: #f0f0ee; color: #555; }
    .ghi-chu { margin-top: 8px; padding: 6px 10px; background: #faf5eb; border: 0.5px solid #e0d8cc; border-radius: 6px; font-size: 12px; color: #8a7a6a; }
  </style>
</head>
<body>
<header id="page-header">KITCHEN</header>
<div id="summary-section">
  <div id="summary-label">Tổng đang chờ</div>
  <div id="summary-list"></div>
</div>
<div id="orders"></div>
<script>
  const tram = new URLSearchParams(window.location.search).get('tram') || '';
  if (tram === 'sushi') document.getElementById('page-header').textContent = 'SUSHI';

  function renderSummary(pending) {
    const totals = {};
    pending.forEach(o => { if (!totals[o.ten]) totals[o.ten] = 0; totals[o.ten] += o.so_luong; });
    const div = document.getElementById('summary-list');
    const sorted = Object.entries(totals).sort((a, b) => b[1] - a[1]);
    if (!sorted.length) { div.innerHTML = '<span style="color:#8a7a6a;font-size:13px">Không có gì</span>'; return; }
    div.innerHTML = sorted.map(([ten, qty]) =>
      `<span style="display:inline-block;background:#f5f0e8;border:0.5px solid #e0d8cc;border-radius:4px;padding:3px 10px;margin:3px;font-size:12px;">
        ${ten} <strong>x${qty}</strong>
      </span>`).join('');
  }

  async function loadOrders() {
    const url = tram ? '/orders?tram=' + tram : '/orders';
    const [res, allRes] = await Promise.all([fetch(url), fetch('/orders')]);
    const orders = await res.json();
    const allOrders = await allRes.json();
    const pending = orders.filter(o => o.trang_thai === 'cho');
    const div = document.getElementById('orders');
    div.innerHTML = '';
    renderSummary(pending);
    if (!pending.length) {
      div.innerHTML = '<p style="text-align:center;color:#8a7a6a;margin-top:40px">Không có order nào</p>';
      return;
    }
    const grouped = {};
    pending.forEach(o => {
      const key = o.order_id || o.id;
      if (!grouped[key]) {
        const others = allOrders.filter(a => a.order_id === key && a.trang_thai === 'cho' && a.tram !== tram);
        grouped[key] = {
          ban: o.ban, thoi_gian: o.thoi_gian, items: [], ids: [], ghi_chu: o.ghi_chu,
          hasStarter: others.some(a => a.category === 'Starters'),
          hasMain: others.some(a => ['Mains','Ramen'].includes(a.category)),
          hasSushi: others.some(a => a.tram === 'sushi'),
        };
      }
      grouped[key].items.push(`x${o.so_luong} — ${o.ten}`);
      grouped[key].ids.push(o.id);
    });
    Object.values(grouped).forEach(g => {
      const tags = [
        g.hasStarter ? '<span class="tag tag-vor">Có vor</span>' : '',
        g.hasMain    ? '<span class="tag tag-hot">Có đồ nóng</span>' : '',
        g.hasSushi   ? '<span class="tag tag-sushi">Có sushi</span>' : '',
      ].filter(Boolean).join(' ');
      div.innerHTML += `
        <div class="order-card">
          <div class="ban">Bàn ${g.ban}</div>
          <div class="time">${new Date(g.thoi_gian).toLocaleTimeString('vi-VN')}</div>
          ${g.items.map(i => `<div class="item">${i}</div>`).join('')}
          ${g.ghi_chu ? `<div class="ghi-chu">${g.ghi_chu}</div>` : ''}
          ${tags ? `<div style="margin-top:8px;display:flex;gap:5px;flex-wrap:wrap;">${tags}</div>` : ''}
          <button class="done-btn" onclick="markGroupDone(${JSON.stringify(g.ids)})">Đánh dấu xong</button>
        </div>`;
    });
  }

  async function markGroupDone(ids) {
    await Promise.all(ids.map(id => fetch('/orders/' + id + '/done', { method: 'PATCH' })));
    loadOrders();
  }

  loadOrders();
  setInterval(loadOrders, 5000);
</script>
</body>
</html>
